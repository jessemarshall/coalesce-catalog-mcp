name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Determine release channel
        id: channel
        # Routes each tag push to either the preview or stable lane based on
        # the package.json version string. Preview releases (e.g. 0.5.0-preview.2)
        # get the `preview` dist-tag and are marked prerelease on GitHub.
        # Stable releases (e.g. 0.5.0) use the default `latest` dist-tag.
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "::error ::Git tag v$TAG_VERSION does not match package.json version $VERSION. Re-tag or re-run npm version."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Whitelist exact shapes so unrecognised prerelease identifiers
          # (-beta.1, -rc.0, typos like -prevew.1) never silently ship to the
          # stable dist-tag.
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-preview\.[0-9]+$ ]]; then
            echo "channel=preview" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "npm_tag=preview" >> "$GITHUB_OUTPUT"
          else
            echo "::error ::Unrecognised version shape '$VERSION'. Expected X.Y.Z (stable) or X.Y.Z-preview.N (preview)."
            exit 1
          fi
          echo "Version: $VERSION"
          cat "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test (excludes live-api)
        run: |
          timeout --kill-after=10 30 npx vitest run --exclude 'tests/integration/live-api.test.ts' \
            && exit 0 || [ $? -eq 124 ]

      - name: Publish to npm
        # --access public is required for the first publish of a new package
        # when --provenance is set (npm defaults new packages to restricted).
        run: npm publish --tag ${{ steps.channel.outputs.npm_tag }} --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for npm registry propagation
        run: |
          echo "Waiting 30s for npm registry to propagate..."
          sleep 30
          npm view coalesce-catalog-mcp@${{ steps.channel.outputs.version }} version

      - name: Create GitHub Release
        # Idempotent: if a release for this tag already exists (e.g. curated
        # notes were drafted before the tag push), leave it alone. The npm
        # publish above is the load-bearing step; the GitHub Release is just
        # changelog UI.
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice ::Release $TAG already exists; skipping create."
            exit 0
          fi
          ARGS=(--title "$TAG" --generate-notes)
          if [ "${{ steps.channel.outputs.is_prerelease }}" = "true" ]; then
            ARGS+=(--prerelease)
          fi
          gh release create "$TAG" "${ARGS[@]}"
        env:
          GH_TOKEN: ${{ github.token }}

      # Implements "Option A" from docs/RELEASES.md after every stable ship:
      # keep @preview at a version at least as new as @latest so users pinning
      # `coalesce-catalog-mcp@preview` for testing don't end up on a version
      # strictly behind stable. Skipped when the current @preview is on a
      # strictly newer base version (0.N+1 cycle already in flight). The
      # NPM_TOKEN automation token bypasses 2FA so no passkey/OTP dance.
      - name: Advance @preview dist-tag to stable (if no newer cycle in flight)
        if: steps.channel.outputs.channel == 'stable'
        run: |
          PKG=$(node -p "require('./package.json').name")
          STABLE="${{ steps.channel.outputs.version }}"
          CURRENT_PREVIEW=$(npm view "$PKG" dist-tags.preview 2>/dev/null || true)

          if [ -z "$CURRENT_PREVIEW" ]; then
            echo "::notice ::No @preview dist-tag set. Pointing it at ${STABLE}."
            npm dist-tag add "${PKG}@${STABLE}" preview
            exit 0
          fi

          # Strip any prerelease suffix and compare base versions via sort -V
          # (numeric-aware, so 0.10.0 orders correctly after 0.9.0).
          CURRENT_BASE=${CURRENT_PREVIEW%%-*}
          HIGHER=$(printf '%s\n%s\n' "$CURRENT_BASE" "$STABLE" | sort -V | tail -n 1)

          if [ "$HIGHER" = "$CURRENT_BASE" ] && [ "$CURRENT_BASE" != "$STABLE" ]; then
            echo "::notice ::@preview (${CURRENT_PREVIEW}) is on a newer base than ${STABLE}; leaving it alone."
          else
            echo "::notice ::Advancing @preview from ${CURRENT_PREVIEW} to ${STABLE}."
            npm dist-tag add "${PKG}@${STABLE}" preview
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
