name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test (excludes live-api integration)
        run: |
          timeout --kill-after=10 30 npx vitest run --exclude 'tests/integration/live-api.test.ts' \
            && exit 0 || [ $? -eq 124 ]

      - name: Pack smoke test
        run: npm pack --dry-run

      # Codegen drift: regenerate src/generated/ from the live introspection
      # and fail if it differs from what's checked in. Catches the case where
      # the upstream Castor schema shifted (new field, removed enum, renamed
      # input) but our generated types — and any handler that depends on them
      # — silently went stale. Skipped automatically when the API token isn't
      # configured (e.g. PRs from forks).
      - name: Check generated types are in sync
        env:
          COALESCE_CATALOG_API_KEY: ${{ secrets.COALESCE_CATALOG_API_KEY }}
          COALESCE_CATALOG_REGION: ${{ vars.COALESCE_CATALOG_REGION || 'eu' }}
        run: |
          if [ -z "$COALESCE_CATALOG_API_KEY" ]; then
            echo "COALESCE_CATALOG_API_KEY not set — skipping codegen drift check."
            exit 0
          fi
          npm run codegen
          if ! git diff --exit-code src/generated/; then
            echo "::error ::src/generated/ is out of date relative to the live Catalog schema."
            echo "::error ::Run \`npm run codegen\` locally and commit the result."
            exit 1
          fi
